#region NFBase
- type: entity # Forge-change remove bullet-trace state, color, and tracer
  id: NFBaseBullet
  parent: BaseBullet
  abstract: true
  components:
  - type: Sprite
    noRot: false
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Projectiles/bullets.rsi
    layers:
    - state: bullet
      shader: unshaded

#region AntiMateriel
- type: entity
  id: NFBaseBulletAntiMateriel
  parent: NFBaseBullet
  abstract: true
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 30
        Structural: 200
    penetrationThreshold: 360
    penetrationDamageTypeRequirement:
    - Structural

- type: entity
  id: NFBulletRifle60AP
  name: bullet (.60 rifle)
  parent: NFBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 70
        Structural: 300
      armorPenetration: 0.85
    penetrationThreshold: 700
    penetrationDamageTypeRequirement:
    - Structural

- type: entity
  id: NFBulletRifle60Incendiary
  name: bullet (.60 Incendiary)
  parent: NFBaseBulletAntiMateriel
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 25
        Heat: 20
        Structural: 100
      armorPenetration: 0.6
    penetrationThreshold: 360
    penetrationDamageTypeRequirement:
    - Structural
  - type: PointLight
    enabled: true
    color: "#ff4300"
    radius: 1.1
    energy: 3.0
  - type: IgniteOnCollide
    fireStacks: 1
  - type: IgnitionSource
    ignited: true
