# TinyMagazinsGrenade

- type: entity
  id: TinyMagazineGrenade
  name: TinyMagazineGrenade
  parent: [ BaseCartridge, BaseC2ContrabandUnredeemable ] # Frontier: BaseSecurityContraband<BaseC2ContrabandUnredeemable
  components:
  - type: Tag
    tags:
    - TMagazineGrenade
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Grenade
    capacity: 3
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
      params:
        variation: 0.05
  - type: Item
    size: Large
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Grenade/grenade_cartridge.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: TMagazineGrenadeFrag
  suffix: осколочные
  parent: TinyMagazineGrenade
  components:
  - type: BallisticAmmoProvider
    proto: NFGrenadeFrag

- type: entity
  id: TMagazineGrenadeEMP
  suffix: "ЭМИ"
  parent: TinyMagazineGrenade
  components:
  - type: BallisticAmmoProvider
    proto: NFGrenadeEMP

